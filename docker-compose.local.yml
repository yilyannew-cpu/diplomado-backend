# =============================================================================
# Stack local completo: Postgres + API
# Uso: make fire   |   docker compose -f docker-compose.local.yml up --build
#
# No afecta Render. El compose original (solo Postgres) sigue igual.
# =============================================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: ffcore-local-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ffcore
      POSTGRES_PASSWORD: ffcore
      POSTGRES_DB: ffcore
    ports:
      - "5432:5432"
    volumes:
      - ffcore_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffcore -d ffcore"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ffcore-local-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_URL: postgresql://ffcore:ffcore@postgres:5432/ffcore?sslmode=disable
      DIRECT_URL: postgresql://ffcore:ffcore@postgres:5432/ffcore?sslmode=disable
      JWT_SECRET: local-dev-jwt-secret-min-32-chars!!
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:5173,http://localhost:8081
    volumes:
      # Código en vivo → hot reload con tsx watch
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./scripts:/app/scripts
      - ./uploads:/app/uploads
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ffcore_local_pgdata:
  api_node_modules:
